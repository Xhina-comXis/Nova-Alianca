<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção do Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 10px;
            max-width: 500px;
        }

        .price {
            font-size: 32px;
            color: #4CAF50;
            margin: 20px 0;
            font-weight: bold;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Site Temporariamente Indisponível</h1>

    <p>Para manter este site online, é necessário pagar o servidor de hospedagem.</p>

    <p>Contribuição necessária para renovar o servidor:</p>

    <div class="price">$45 USD</div>

    <p>Após o pagamento, o site será restaurado normalmente.</p>

    <a href="#">Realizar Pagamento</a>
</div>

</body>
</html>
